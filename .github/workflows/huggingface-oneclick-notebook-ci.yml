name: dispatch-huggingface-oneclick-workaround

on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Forwarded substring filter (blank = all)"
        required: false
        default: ""
      use_runner_hf_cache:
        description: "Forwarded cache mode"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  actions: write
  contents: read

concurrency:
  group: dispatch-huggingface-oneclick-workaround
  cancel-in-progress: false

jobs:
  dispatch-workaround:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch workaround CI
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_FILTER: ${{ inputs.filter }}
          INPUT_USE_RUNNER_HF_CACHE: ${{ inputs.use_runner_hf_cache }}
          TARGET_REF: ci/huggingface_oneclick_workaround
          TARGET_WORKFLOW: huggingface-oneclick-notebook-ci.yml
        run: |
          gh workflow run "$TARGET_WORKFLOW" \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$TARGET_REF" \
            --field filter="$INPUT_FILTER" \
            --field use_runner_hf_cache="$INPUT_USE_RUNNER_HF_CACHE"
