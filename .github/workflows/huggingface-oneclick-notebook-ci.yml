name: schedule-huggingface-oneclick-workaround

on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Forwarded substring filter (blank = all)"
        required: false
        default: ""
      use_runner_hf_cache:
        description: "Forwarded cache mode; the scheduler always dispatches false"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    # Run daily at 06:05 and 18:05 Beijing time, avoiding top-of-hour load.
    - cron: "5 6,18 * * *"
      timezone: "Asia/Shanghai"

permissions:
  actions: write
  contents: read

concurrency:
  group: schedule-huggingface-oneclick-workaround
  cancel-in-progress: false

jobs:
  dispatch-workaround:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch cold-cache workaround CI
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REF: ci/huggingface_oneclick_workaround
          TARGET_WORKFLOW: huggingface-oneclick-notebook-ci.yml
        run: |
          gh workflow run "$TARGET_WORKFLOW" \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$TARGET_REF" \
            --field filter="" \
            --field use_runner_hf_cache=false
