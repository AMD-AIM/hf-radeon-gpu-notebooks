name: huggingface-oneclick-notebook-ci

on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Substring filter on model id / notebook name (blank = all)"
        required: false
        default: ""
  push:
    branches: [main, "ci/**"]

permissions:
  contents: write

concurrency:
  group: huggingface-oneclick-ci
  cancel-in-progress: false

jobs:
  run-notebooks:
    runs-on: [self-hosted, rocm, w7900]
    timeout-minutes: 2880
    env:
      CI_CONTAINER: hf-ci-oneclick-${{ github.run_id }}
      HF_CI_IMAGE: crpi-ygzb1jbfyj9pjrm6.cn-shenzhen.personal.cr.aliyuncs.com/images_hana/huaggingface_for_amd_radeon:20260711_workaround

    steps:
      - name: Checkout target revision
        timeout-minutes: 15
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true
          clean: false
          sparse-checkout: |
            .github
            doc
            original_notebooks
            tools
          sparse-checkout-cone-mode: true

      - name: Confirm target commit
        run: |
          git checkout -f "${{ github.sha }}"
          git log --oneline -1

      - name: Clean up stale CI containers
        run: |
          docker ps -aq --filter "name=hf-ci-oneclick-" | xargs -r docker rm -f
          docker ps -aq --filter "name=hf-ci-gpu23-" | xargs -r docker rm -f

      - name: Select idle Radeon GPU
        id: select_gpu
        run: |
          python3 tools/select_idle_rocm_gpu.py \
            --max-used-gb "${RADEON_CI_GPU_MAX_USED_GB:-2}" \
            --max-util-pct "${RADEON_CI_GPU_MAX_UTIL_PCT:-5}" \
            --wait-seconds "${RADEON_CI_GPU_WAIT_SECONDS:-3600}" \
            --poll-seconds "${RADEON_CI_GPU_POLL_SECONDS:-30}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Execute notebook CI
        env:
          INPUT_FILTER: ${{ github.event.inputs.filter }}
          HF_ONECLICK_TOKEN: ${{ secrets.HF_ONECLICK_TOKEN }}
        run: |
          rm -rf results
          mkdir -p results

          FILTER="${INPUT_FILTER:-}"
          if [ -z "${HF_ONECLICK_TOKEN:-}" ]; then
            echo "::error::HF_ONECLICK_TOKEN secret is required for this token-enabled branch"
            exit 1
          fi

          SELECTED_RENDER_NODE="${{ steps.select_gpu.outputs.render_node }}"
          if [ -z "$SELECTED_RENDER_NODE" ]; then
            echo "::error::Select idle Radeon GPU did not produce a render node"
            exit 1
          fi

          HF_CACHE_ROOT=/disk/ssd2/huggingface_cache
          mkdir -p "$HF_CACHE_ROOT/hub" "$HF_CACHE_ROOT/datasets" "$HF_CACHE_ROOT/transformers"

          echo "Selected Radeon GPU: card=${{ steps.select_gpu.outputs.card_index }} render=$SELECTED_RENDER_NODE pci=${{ steps.select_gpu.outputs.pci_bus }}"
          docker run --rm \
            --name "$CI_CONTAINER" \
            --device=/dev/kfd \
            --device="$SELECTED_RENDER_NODE" \
            --group-add 44 --group-add 993 \
            --security-opt seccomp=unconfined \
            --ipc=host --shm-size 32g \
            -v /disk/ssd2:/disk/ssd2 \
            -v "$PWD":/workspace -w /workspace \
            -e HF_ENDPOINT=http://134.199.133.77 \
            -e HF_HUB_DISABLE_XET=1 \
            -e HF_TOKEN="$HF_ONECLICK_TOKEN" \
            -e HUGGING_FACE_HUB_TOKEN="$HF_ONECLICK_TOKEN" \
            -e HUGGINGFACEHUB_API_TOKEN="$HF_ONECLICK_TOKEN" \
            -e HF_HOME="$HF_CACHE_ROOT" \
            -e HF_HUB_CACHE="$HF_CACHE_ROOT/hub" \
            -e HF_DATASETS_CACHE="$HF_CACHE_ROOT/datasets" \
            -e TRANSFORMERS_CACHE="$HF_CACHE_ROOT/transformers" \
            -e CI_FILTER="$FILTER" \
            -e RADEON_CI_RENDER_NODE="$SELECTED_RENDER_NODE" \
            -e RADEON_CI_GPU_CARD="${{ steps.select_gpu.outputs.card_index }}" \
            -e RADEON_CI_GPU_PCI_BUS="${{ steps.select_gpu.outputs.pci_bus }}" \
            -e PYTHONUNBUFFERED=1 \
            --entrypoint /bin/bash \
            "$HF_CI_IMAGE" \
            -lc 'args=(
                  --results-dir results
                  --target-file doc/ci_target_models.csv
                  --fail-on none
                )
                if [ -n "$CI_FILTER" ]; then args+=(--filter "$CI_FILTER"); fi
                python3 -u tools/run_notebooks.py "${args[@]}"'

      - name: Sync downloaded notebook snapshots
        if: always() && startsWith(github.ref, 'refs/heads/')
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ -z "$BRANCH" ]; then
            echo "No branch ref is available; skip original_notebooks sync."
            exit 0
          fi

          if [ ! -d original_notebooks ]; then
            echo "original_notebooks was not created; nothing to sync."
            exit 0
          fi

          git add original_notebooks
          if git diff --cached --quiet -- original_notebooks; then
            echo "No downloaded notebook snapshot changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update original notebooks from Hugging Face [skip ci]"

          retry_git() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              echo "::warning::git command failed on attempt ${attempt}/5: $*"
              sleep $((attempt * 20))
            done
            return 1
          }

          if ! retry_git git pull --rebase origin "$BRANCH"; then
            echo "::warning::Could not rebase downloaded notebook snapshot update; leaving CI result unchanged."
            exit 0
          fi
          if ! retry_git git push origin "HEAD:$BRANCH"; then
            echo "::warning::Could not push downloaded notebook snapshot update; leaving CI result unchanged."
            exit 0
          fi

      - name: Tear down CI container
        if: always()
        run: |
          docker rm -f "$CI_CONTAINER" 2>/dev/null || true
          LOCK_FILE="${{ steps.select_gpu.outputs.lock_file }}"
          if [ -n "$LOCK_FILE" ]; then rm -f "$LOCK_FILE"; fi

      - name: Publish summary
        if: always()
        run: cat results/summary.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "no summary produced" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: huggingface-oneclick-results-${{ github.run_id }}
          path: |
            results/*.json
            results/*.ipynb
            results/*.html
            results/*.log
            results/summary.md
            results/progress.md
          retention-days: 30
