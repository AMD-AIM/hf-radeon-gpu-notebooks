name: Hugging Face One-Click Notebook CI
run-name: "[Run] Workaround CI"

on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Substring filter on model id / notebook name (blank = all)"
        required: false
        default: ""
      use_runner_hf_cache:
        description: "Use the runner-local Hugging Face cache mounted from /disk/ssd2/huggingface_cache"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches: [main, "ci/**"]

permissions:
  contents: write

concurrency:
  group: huggingface-oneclick-ci
  cancel-in-progress: false

jobs:
  run-notebooks:
    runs-on: [self-hosted, rocm, w7900]
    timeout-minutes: 2880
    env:
      CI_CONTAINER: hf-ci-oneclick-${{ github.run_id }}
      HF_CI_IMAGE: crpi-ygzb1jbfyj9pjrm6.cn-shenzhen.personal.cr.aliyuncs.com/images_hana/huaggingface_for_amd_radeon:20260711_workaround_fix_torch_streaming

    steps:
      - name: Clear stale run outputs
        run: |
          if [ -z "${GITHUB_WORKSPACE:-}" ]; then
            echo "::error::GITHUB_WORKSPACE is not set"
            exit 1
          fi
          rm -rf -- "$GITHUB_WORKSPACE/results"

      - name: Checkout target revision
        id: checkout
        timeout-minutes: 15
        # Rewrite GitHub fetches only for this step. The proxy receives no GitHub
        # credential, and later authenticated pull/push commands keep the direct origin.
        env:
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: "url.https://gh-test.anruicloud.com/.insteadOf"
          GIT_CONFIG_VALUE_0: "https://github.com/"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true
          clean: false
          sparse-checkout: |
            .github
            doc
            original_notebooks
            tools
          sparse-checkout-cone-mode: true

      - name: Confirm target commit
        run: |
          git checkout -f "${{ github.sha }}"
          git log --oneline -1

      - name: Clean up stale CI containers
        run: |
          docker ps -aq --filter "name=hf-ci-oneclick-" | xargs -r docker rm -f

      - name: Select idle Radeon GPU
        id: select_gpu
        run: |
          python3 tools/select_idle_rocm_gpu.py \
            --max-used-gb "${RADEON_CI_GPU_MAX_USED_GB:-2}" \
            --max-util-pct "${RADEON_CI_GPU_MAX_UTIL_PCT:-5}" \
            --wait-seconds "${RADEON_CI_GPU_WAIT_SECONDS:-3600}" \
            --poll-seconds "${RADEON_CI_GPU_POLL_SECONDS:-30}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Execute notebook CI
        env:
          INPUT_FILTER: ${{ github.event.inputs.filter }}
          INPUT_USE_RUNNER_HF_CACHE: ${{ github.event.inputs.use_runner_hf_cache }}
          HF_ONECLICK_TOKEN: ${{ secrets.HF_ONECLICK_TOKEN }}
        run: |
          rm -rf results
          mkdir -p results

          FILTER="${INPUT_FILTER:-}"
          if [ -z "${HF_ONECLICK_TOKEN:-}" ]; then
            echo "::error::HF_ONECLICK_TOKEN secret is required for this token-enabled branch"
            exit 1
          fi

          SELECTED_RENDER_NODE="${{ steps.select_gpu.outputs.render_node }}"
          if [ -z "$SELECTED_RENDER_NODE" ]; then
            echo "::error::Select idle Radeon GPU did not produce a render node"
            exit 1
          fi

          USE_RUNNER_HF_CACHE="${INPUT_USE_RUNNER_HF_CACHE:-true}"
          case "$USE_RUNNER_HF_CACHE" in
            true|1|yes|y)
              HF_CACHE_MODE="runner"
              HF_CACHE_ROOT=/disk/ssd2/huggingface_cache
              mkdir -p "$HF_CACHE_ROOT/hub" "$HF_CACHE_ROOT/datasets"
              ;;
            false|0|no|n)
              HF_CACHE_MODE="container"
              HF_CACHE_ROOT="/tmp/huggingface_cache/${{ github.run_id }}-${{ github.run_attempt }}"
              ;;
            *)
              echo "::error::use_runner_hf_cache must be true or false, got: $USE_RUNNER_HF_CACHE"
              exit 1
              ;;
          esac

          echo "Selected Radeon GPU: card=${{ steps.select_gpu.outputs.card_index }} render=$SELECTED_RENDER_NODE pci=${{ steps.select_gpu.outputs.pci_bus }}"
          echo "Hugging Face cache mode: $HF_CACHE_MODE ($HF_CACHE_ROOT)"
          docker run --rm \
            --name "$CI_CONTAINER" \
            --device=/dev/kfd \
            --device="$SELECTED_RENDER_NODE" \
            --group-add 44 --group-add 993 \
            --security-opt seccomp=unconfined \
            --ipc=host --shm-size 32g \
            -v /disk/ssd2:/disk/ssd2 \
            -v "$PWD":/workspace -w /workspace \
            -e HF_ENDPOINT=http://134.199.133.77 \
            -e HF_HUB_DISABLE_XET=1 \
            -e HF_TOKEN="$HF_ONECLICK_TOKEN" \
            -e HUGGING_FACE_HUB_TOKEN="$HF_ONECLICK_TOKEN" \
            -e HUGGINGFACEHUB_API_TOKEN="$HF_ONECLICK_TOKEN" \
            -e HF_HOME="$HF_CACHE_ROOT" \
            -e HF_HUB_CACHE="$HF_CACHE_ROOT/hub" \
            -e HF_DATASETS_CACHE="$HF_CACHE_ROOT/datasets" \
            -e TRANSFORMERS_CACHE="$HF_CACHE_ROOT/hub" \
            -e HF_CACHE_MODE="$HF_CACHE_MODE" \
            -e CI_FILTER="$FILTER" \
            -e RADEON_CI_RENDER_NODE="$SELECTED_RENDER_NODE" \
            -e RADEON_CI_GPU_CARD="${{ steps.select_gpu.outputs.card_index }}" \
            -e RADEON_CI_GPU_PCI_BUS="${{ steps.select_gpu.outputs.pci_bus }}" \
            -e PYTHONUNBUFFERED=1 \
            --entrypoint /bin/bash \
            "$HF_CI_IMAGE" \
            -lc 'args=(
                  --results-dir results
                  --target-file doc/ci_target_models.csv
                  --fail-on none
                )
                if [ -n "$CI_FILTER" ]; then args+=(--filter "$CI_FILTER"); fi
                python3 -u tools/run_notebooks.py "${args[@]}"'

      - name: Sync downloaded notebook snapshots
        if: always() && steps.checkout.outcome == 'success' && startsWith(github.ref, 'refs/heads/')
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ -z "$BRANCH" ]; then
            echo "No branch ref is available; skip original_notebooks sync."
            exit 0
          fi

          if [ ! -d original_notebooks ]; then
            echo "original_notebooks was not created; nothing to sync."
            exit 0
          fi

          git add original_notebooks
          if git diff --cached --quiet -- original_notebooks; then
            echo "No downloaded notebook snapshot changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update original notebooks from Hugging Face [skip ci]"

          retry_git() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              echo "::warning::git command failed on attempt ${attempt}/5: $*"
              sleep $((attempt * 20))
            done
            return 1
          }

          git_via_fetch_proxy() {
            git \
              -c "url.https://gh-test.anruicloud.com/.insteadOf=https://github.com/" \
              "$@"
          }

          if ! retry_git git_via_fetch_proxy pull --rebase origin "$BRANCH"; then
            echo "::warning::Could not rebase downloaded notebook snapshot update; leaving CI result unchanged."
            exit 0
          fi
          if ! retry_git git push origin "HEAD:$BRANCH"; then
            echo "::warning::Could not push downloaded notebook snapshot update; leaving CI result unchanged."
            exit 0
          fi

      - name: Tear down CI container
        if: always()
        run: |
          docker rm -f "$CI_CONTAINER" 2>/dev/null || true
          LOCK_FILE="${{ steps.select_gpu.outputs.lock_file }}"
          if [ -n "$LOCK_FILE" ]; then rm -f "$LOCK_FILE"; fi

      - name: Publish summary
        if: always()
        env:
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
        run: |
          if [ -s results/summary.md ]; then
            cat results/summary.md >> "$GITHUB_STEP_SUMMARY"
          elif [ "$CHECKOUT_OUTCOME" != "success" ]; then
            {
              echo "# Hugging Face One-Click Notebook CI - Results"
              echo
              echo "**Infrastructure failure: repository checkout did not complete.**"
              echo
              echo "Notebook execution did not start, so no current-run summary was produced."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# Hugging Face One-Click Notebook CI - Results"
              echo
              echo "**No current-run notebook summary was produced.**"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results
        if: always() && steps.checkout.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: huggingface-oneclick-results-${{ github.run_id }}
          path: |
            results/*.json
            results/*.ipynb
            results/*.html
            results/*.log
            results/summary.md
            results/progress.md
          retention-days: 30
