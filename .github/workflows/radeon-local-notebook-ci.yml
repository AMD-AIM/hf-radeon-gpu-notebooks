name: radeon-local-notebook-ci

on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Substring filter on model id / notebook name (blank = all)"
        required: false
        default: ""
      mode:
        description: "Notebook source to test"
        type: choice
        options: [both, native, fixed]
        default: both
      fixed_scope:
        description: "When mode=both, run Radeon fixed notebooks for all targets or native failures"
        type: choice
        options: [all, failed-native]
        default: all
  push:
    branches: [main, "ci/**"]

concurrency:
  group: radeon-local-ci
  cancel-in-progress: false

jobs:
  run-notebooks:
    runs-on: [self-hosted, rocm, w7900]
    timeout-minutes: 2880
    env:
      CI_CONTAINER: hf-ci-radeon-${{ github.run_id }}

    steps:
      - name: Checkout target revision
        timeout-minutes: 15
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: false
          sparse-checkout: |
            .github
            doc
            radeon_notebooks
            tools
          sparse-checkout-cone-mode: true

      - name: Confirm target commit
        run: |
          git checkout -f "${{ github.sha }}"
          git log --oneline -1

      - name: Clean up stale CI containers
        run: |
          docker ps -aq --filter "name=hf-ci-radeon-" | xargs -r docker rm -f
          docker ps -aq --filter "name=hf-ci-gpu23-" | xargs -r docker rm -f

      - name: Select idle Radeon GPU
        id: select_gpu
        run: |
          python3 tools/select_idle_rocm_gpu.py \
            --max-used-gb "${RADEON_CI_GPU_MAX_USED_GB:-2}" \
            --max-util-pct "${RADEON_CI_GPU_MAX_UTIL_PCT:-5}" \
            --wait-seconds "${RADEON_CI_GPU_WAIT_SECONDS:-3600}" \
            --poll-seconds "${RADEON_CI_GPU_POLL_SECONDS:-30}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Execute notebook CI
        env:
          INPUT_FILTER: ${{ github.event.inputs.filter }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_FIXED_SCOPE: ${{ github.event.inputs.fixed_scope }}
        run: |
          rm -rf results
          mkdir -p results

          MODE="${INPUT_MODE:-both}"
          FIXED_SCOPE="${INPUT_FIXED_SCOPE:-all}"
          FILTER="${INPUT_FILTER:-}"
          FAIL_ON=all
          if [ "$MODE" = "both" ]; then
            FAIL_ON=fixed
          fi

          SELECTED_RENDER_NODE="${{ steps.select_gpu.outputs.render_node }}"
          if [ -z "$SELECTED_RENDER_NODE" ]; then
            echo "::error::Select idle Radeon GPU did not produce a render node"
            exit 1
          fi

          HF_CACHE_ROOT=/disk/ssd2/huggingface_cache
          mkdir -p "$HF_CACHE_ROOT/hub" "$HF_CACHE_ROOT/datasets" "$HF_CACHE_ROOT/transformers"

          echo "Selected Radeon GPU: card=${{ steps.select_gpu.outputs.card_index }} render=$SELECTED_RENDER_NODE pci=${{ steps.select_gpu.outputs.pci_bus }}"
          docker run --rm \
            --name "$CI_CONTAINER" \
            --device=/dev/kfd \
            --device="$SELECTED_RENDER_NODE" \
            --group-add 44 --group-add 993 \
            --security-opt seccomp=unconfined \
            --ipc=host --shm-size 32g \
            -v /disk/ssd1:/disk/ssd1 \
            -v /disk/ssd2:/disk/ssd2 \
            -v "$PWD":/workspace -w /workspace \
            -e HF_ENDPOINT=http://134.199.133.77 \
            -e HF_HUB_DISABLE_XET=1 \
            -e HF_HOME="$HF_CACHE_ROOT" \
            -e HF_HUB_CACHE="$HF_CACHE_ROOT/hub" \
            -e HF_DATASETS_CACHE="$HF_CACHE_ROOT/datasets" \
            -e TRANSFORMERS_CACHE="$HF_CACHE_ROOT/transformers" \
            -e CI_MODE="$MODE" \
            -e CI_FIXED_SCOPE="$FIXED_SCOPE" \
            -e CI_FAIL_ON="$FAIL_ON" \
            -e CI_FILTER="$FILTER" \
            -e RADEON_CI_RENDER_NODE="$SELECTED_RENDER_NODE" \
            -e RADEON_CI_GPU_CARD="${{ steps.select_gpu.outputs.card_index }}" \
            -e RADEON_CI_GPU_PCI_BUS="${{ steps.select_gpu.outputs.pci_bus }}" \
            -e PYTHONUNBUFFERED=1 \
            --entrypoint /bin/bash \
            huaggingface_for_amd_radeon:latest \
            -lc 'args=(
                  --results-dir results
                  --target-file doc/ci_target_models.csv
                  --mode "$CI_MODE"
                  --fixed-scope "$CI_FIXED_SCOPE"
                  --fail-on "$CI_FAIL_ON"
                )
                if [ -n "$CI_FILTER" ]; then args+=(--filter "$CI_FILTER"); fi
                python3 -u tools/run_notebooks.py "${args[@]}"'

      - name: Tear down CI container
        if: always()
        run: |
          docker rm -f "$CI_CONTAINER" 2>/dev/null || true
          LOCK_FILE="${{ steps.select_gpu.outputs.lock_file }}"
          if [ -n "$LOCK_FILE" ]; then rm -f "$LOCK_FILE"; fi

      - name: Publish summary
        if: always()
        run: cat results/summary.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "no summary produced" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radeon-notebook-results-${{ github.run_id }}
          path: |
            results/*.json
            results/*.ipynb
            results/*.html
            results/*.log
            results/summary.md
            results/progress.md
          retention-days: 30
